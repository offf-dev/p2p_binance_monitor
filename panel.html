<div class="monitoring-panel">
    <input type="number" id="targetPrice" placeholder="Желаемый курс" step="0.01">
    <input type="number" id="orderAmount" placeholder="Сумма ордера">
    <button id="startMonitoring">Старт</button>
    <button id="stopMonitoring" class="stop" disabled>Стоп</button>
    <button id="checkSelectors" class="check">Проверить селекторы</button>
    <span class="status" id="status">Ожидание...</span>
    <button id="toggleCollapse" class="toggle" title="Свернуть/развернуть">▲</button>
</div>
